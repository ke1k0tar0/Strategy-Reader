name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Run Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks scanner
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --source . --report-path gitleaks-report.json --exit-code 1
